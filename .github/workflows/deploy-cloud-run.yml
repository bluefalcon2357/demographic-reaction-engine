# Builds the app with Cloud Build and deploys to Cloud Run on every push to main.
#
# One-time GCP setup (see chat for full commands):
#   1. Enable APIs:  run, cloudbuild, artifactregistry, iamcredentials, secretmanager
#   2. Create a deploy service account and grant it the roles listed in the chat instructions.
#   3. Set up Workload Identity Federation so this workflow can impersonate that SA.
#
# Required GitHub secrets (Settings -> Secrets and variables -> Actions):
#   GCP_WORKLOAD_IDENTITY_PROVIDER  - e.g. projects/123456789/locations/global/workloadIdentityPools/github-pool/providers/github-provider
#   GCP_SERVICE_ACCOUNT             - e.g. github-deployer@sample-prod-deployment.iam.gserviceaccount.com
#   GEMINI_API_KEY                  - your Gemini API key, passed straight through to Cloud Run as a plain env var

name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: sample-prod-deployment
  REGION: us-central1
  SERVICE: demographic-reaction-engine

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format='value(status.url)')
          echo "Deployed: $URL"
          echo "### Cloud Run URL" >> "$GITHUB_STEP_SUMMARY"
          echo "$URL" >> "$GITHUB_STEP_SUMMARY"
